# Remote Linux Server — CARLA server + Python client
#
# Prerequisites on the Linux host:
#   - NVIDIA Driver >= 550
#   - NVIDIA Container Toolkit (nvidia-docker2)
#   - Docker Engine >= 24
#
# Usage:
#   cp .env.example .env          # edit as needed
#   docker compose -f docker/compose.remote.yml up
#
# To run only data collection (Phase 1):
#   docker compose -f docker/compose.remote.yml run --rm client --phase 1 --num-train 100

name: carla-counterfactual-remote

services:
  # -------------------------------------------------------
  # CARLA Simulator (Unreal Engine 4, GPU rendering)
  # -------------------------------------------------------
  carla-server:
    image: carlasim/carla:${CARLA_VERSION:-0.9.15}
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    command: /bin/bash -c "./CarlaUE4.sh -nullrhi -nosound -carla-server -world-port=2000 -quality-level=Low"
    ports:
      - "2000:2000"   # CARLA primary port
      - "2001:2001"   # CARLA secondary (traffic manager)
      - "8080:8080"   # optional web viewer
    volumes:
      - carla-logs:/tmp/CarlaLogs
    networks:
      - carla-net
    restart: "no"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"localhost\",2000)); s.close()' 2>/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 120s

  # -------------------------------------------------------
  # Python Client — data collection & counterfactual gen
  # -------------------------------------------------------
  client:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      carla-server:
        condition: service_healthy
    environment:
      - CARLA_HOST=carla-server
      - CARLA_PORT=2000
    command: >
      --host carla-server
      --port 2000
      --phase ${RUN_PHASE:-all}
      --num-train ${NUM_TRAIN:-10000}
      --num-test  ${NUM_TEST:-2000}
      --versions  ${NUM_VERSIONS:-10}
    volumes:
      - ../data:/app/data       # persist dataset on host
      - /var/run/docker.sock:/var/run/docker.sock  # メモリ超過時にサーバーコンテナを停止するため
    networks:
      - carla-net
    restart: "no"

volumes:
  carla-logs:

networks:
  carla-net:
    driver: bridge
